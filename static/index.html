<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合偶平方图像分类与分割平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.3) !important;
            backdrop-filter: blur(10px);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-available {
            background: #28a745;
            color: white;
        }
        .status-unavailable {
            background: #dc3545;
            color: white;
        }
        .nav-tabs {
            background: white;
            border-radius: 10px 10px 0 0;
        }
        .tab-content {
            background: white;
            border-radius: 0 0 10px 10px;
            padding: 2rem;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        .upload-area.dragover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #764ba2;
        }
        .progress-container {
            margin: 1rem 0;
        }
        .result-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 1rem;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-cpu"></i> 合偶平方图像分类与分割平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('home')">
                            <i class="bi bi-house"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('classification')">
                            <i class="bi bi-grid"></i> 图像分类
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('segmentation')">
                            <i class="bi bi-layers"></i> 图像分割
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主页 -->
    <div id="page-home" class="container">
        <!-- 系统状态卡片 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="bi bi-speedometer2"></i> 系统状态
                </h5>
                <div id="system-status" class="mt-3">
                    <div class="loader"></div>
                </div>
            </div>
        </div>

        <!-- 功能选择卡片 -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-grid feature-icon text-primary"></i>
                        <h4 class="card-title">图像分类</h4>
                        <p class="card-text">支持模型训练、测试和在线推理</p>
                        <button class="btn btn-primary" onclick="showPage('classification')">
                            进入分类功能
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-layers feature-icon text-success"></i>
                        <h4 class="card-title">图像分割</h4>
                        <p class="card-text">基于U-Net的语义分割功能</p>
                        <button class="btn btn-success" onclick="showPage('segmentation')">
                            进入分割功能
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图像分类页面 -->
    <div id="page-classification" class="container hidden">
        <div class="card">
            <div class="card-body">
                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#class-infer">
                            <i class="bi bi-magic"></i> 在线推理
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#class-train">
                            <i class="bi bi-gear"></i> 模型训练
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#class-test">
                            <i class="bi bi-clipboard-check"></i> 模型测试
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- 推理标签页 -->
                    <div class="tab-pane fade show active" id="class-infer">
                        <h4 class="mb-4">图像分类推理</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="upload-area" id="class-upload-area">
                                    <i class="bi bi-cloud-upload" style="font-size: 3rem;"></i>
                                    <p class="mt-2">点击或拖拽上传图片</p>
                                    <input type="file" id="class-image-input" accept="image/*" hidden>
                                </div>
                                <div id="class-image-preview" class="hidden">
                                    <img id="class-preview-img" class="result-image">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">选择模型（可选）</label>
                                    <select class="form-select" id="class-model-select">
                                        <option value="">使用最新模型</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="class-predict-btn" onclick="classifyImage()">
                                    <i class="bi bi-play"></i> 开始分类
                                </button>
                                <div id="class-result" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 训练标签页 -->
                    <div class="tab-pane fade" id="class-train">
                        <h4 class="mb-4">训练分类模型</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">训练数据路径</label>
                                    <input type="text" class="form-control" id="class-train-path" placeholder="/path/to/train/data">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">验证数据路径（可选）</label>
                                    <input type="text" class="form-control" id="class-valid-path" placeholder="/path/to/valid/data">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">训练轮数</label>
                                    <input type="number" class="form-control" id="class-epochs" value="10">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">学习率</label>
                                    <input type="number" class="form-control" id="class-lr" value="0.001" step="0.0001">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">批次大小</label>
                                    <input type="number" class="form-control" id="class-batch-size" value="16">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">模型架构</label>
                                    <select class="form-select" id="class-model-arch">
                                        <option value="resnet18">ResNet-18</option>
                                        <option value="resnet34">ResNet-34</option>
                                        <option value="resnet50">ResNet-50</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">
                                        预训练模型
                                        <i class="bi bi-info-circle" data-bs-toggle="tooltip" title="使用预训练权重可以加快收敛,但需要从网络下载"></i>
                                    </label>
                                    <select class="form-select" id="class-pretrained" onchange="updatePretrainedHint('class')">
                                        <option value="false">不使用(从零训练,无需下载)</option>
                                        <option value="true">使用预训练权重(需要下载)</option>
                                    </select>
                                    <small class="text-muted" id="class-pretrained-hint">
                                        推荐选择"不使用"以避免网络超时问题
                                    </small>
                                </div>
                                <button class="btn btn-primary" id="class-train-btn" onclick="trainClassification()">
                                    <i class="bi bi-play"></i> 开始训练
                                </button>
                            </div>
                            <div class="col-md-6">
                                <div id="class-train-progress" class="hidden">
                                    <h5>训练进度</h5>
                                    <div class="progress-container">
                                        <div class="progress">
                                            <div class="progress-bar" id="class-train-bar" role="progressbar" style="width: 0%"></div>
                                        </div>
                                    </div>
                                    <div id="class-train-log"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 测试标签页 -->
                    <div class="tab-pane fade" id="class-test">
                        <h4 class="mb-4">测试分类模型</h4>
                        <div class="mb-3">
                            <label class="form-label">测试数据路径</label>
                            <input type="text" class="form-control" id="class-test-path" placeholder="/path/to/test/data">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">选择模型</label>
                            <select class="form-select" id="class-test-model">
                                <option value="">使用最新模型</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="class-test-btn" onclick="testClassification()">
                            <i class="bi bi-play"></i> 开始测试
                        </button>
                        <div id="class-test-result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图像分割页面 -->
    <div id="page-segmentation" class="container hidden">
        <div class="card">
            <div class="card-body">
                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#seg-infer">
                            <i class="bi bi-magic"></i> 在线推理
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#seg-train">
                            <i class="bi bi-gear"></i> 模型训练
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#seg-test">
                            <i class="bi bi-clipboard-check"></i> 模型测试
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- 推理标签页 -->
                    <div class="tab-pane fade show active" id="seg-infer">
                        <h4 class="mb-4">图像分割推理</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="upload-area" id="seg-upload-area">
                                    <i class="bi bi-cloud-upload" style="font-size: 3rem;"></i>
                                    <p class="mt-2">点击或拖拽上传图片</p>
                                    <input type="file" id="seg-image-input" accept="image/*" hidden>
                                </div>
                                <div id="seg-image-preview" class="hidden">
                                    <img id="seg-preview-img" class="result-image">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">选择模型（可选）</label>
                                    <select class="form-select" id="seg-model-select">
                                        <option value="">使用最新模型</option>
                                    </select>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" id="seg-overlay" checked>
                                    <label class="form-check-label">生成叠加图</label>
                                </div>
                                <button class="btn btn-success" id="seg-predict-btn" onclick="segmentImage()">
                                    <i class="bi bi-play"></i> 开始分割
                                </button>
                                <div id="seg-result" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 训练标签页 -->
                    <div class="tab-pane fade" id="seg-train">
                        <h4 class="mb-4">训练分割模型</h4>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">训练数据路径</label>
                                    <input type="text" class="form-control" id="seg-train-path" placeholder="/path/to/train/data">
                                    <small class="text-muted">数据目录应包含images/和labels/子目录，以及codes.txt文件</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">训练轮数</label>
                                    <input type="number" class="form-control" id="seg-epochs" value="10">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">学习率</label>
                                    <input type="number" class="form-control" id="seg-lr" value="0.001" step="0.0001">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">批次大小</label>
                                    <input type="number" class="form-control" id="seg-batch-size" value="8">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">
                                        预训练模型
                                        <i class="bi bi-info-circle" data-bs-toggle="tooltip" title="使用预训练权重可以加快收敛,但需要从网络下载"></i>
                                    </label>
                                    <select class="form-select" id="seg-pretrained" onchange="updatePretrainedHint('seg')">
                                        <option value="false">不使用(从零训练,无需下载)</option>
                                        <option value="true">使用预训练权重(需要下载)</option>
                                    </select>
                                    <small class="text-muted" id="seg-pretrained-hint">
                                        推荐选择"不使用"以避免网络超时问题
                                    </small>
                                </div>
                                <button class="btn btn-success" id="seg-train-btn" onclick="trainSegmentation()">
                                    <i class="bi bi-play"></i> 开始训练
                                </button>
                            </div>
                            <div class="col-md-6">
                                <div id="seg-train-progress" class="hidden">
                                    <h5>训练进度</h5>
                                    <div class="progress-container">
                                        <div class="progress">
                                            <div class="progress-bar" id="seg-train-bar" role="progressbar" style="width: 0%"></div>
                                        </div>
                                    </div>
                                    <div id="seg-train-log"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 测试标签页 -->
                    <div class="tab-pane fade" id="seg-test">
                        <h4 class="mb-4">测试分割模型</h4>
                        <div class="mb-3">
                            <label class="form-label">测试数据路径</label>
                            <input type="text" class="form-control" id="seg-test-path" placeholder="/path/to/test/data">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">选择模型</label>
                            <select class="form-select" id="seg-test-model">
                                <option value="">使用最新模型</option>
                            </select>
                        </div>
                        <button class="btn btn-success" id="seg-test-btn" onclick="testSegmentation()">
                            <i class="bi bi-play"></i> 开始测试
                        </button>
                        <div id="seg-test-result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="loader"></div>
                    <p id="loadingText" class="mt-3">处理中...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js?v=20260306"></script>
</body>
</html>
